<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Erro interno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333333;
        }
        .error-container {
            text-align: center;
            padding: 40px;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #483DAD;
            line-height: 1;
        }
        .error-title {
            font-size: 24px;
            font-weight: 600;
            margin-top: 10px;
        }
        .error-message {
            font-size: 16px;
            color: #666;
            margin-top: 15px;
            max-width: 400px;
        }
        .btn-home {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background-color: #483DAD;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        .btn-home:hover {
            background-color: #3a3190;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <h1 class="error-title">Erro interno do servidor</h1>
        <p class="error-message">Ocorreu um erro inesperado. Tente novamente mais tarde.</p>
        <a href="/" class="btn-home">Voltar ao inicio</a>
    </div>
</body>
</html>
